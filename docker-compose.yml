services:
  postgres:
    image: postgres:16-alpine
    container_name: ifactu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ifactu_user
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ifactu_db
    volumes:
      - ifactu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifactu_user -d ifactu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ifactu_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3002"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./backend/certificados:/app/certificados
      - ./backend/certs:/app/certs
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ifactu_pgdata:
